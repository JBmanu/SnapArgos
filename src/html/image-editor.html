<!-- src/html/image-editor.html — Image Editor: trim & resize images client-side -->
<div class="imgedit-page animate-fade-in">

  <h1 class="page-heading">Image Editor</h1>

  <div class="imgedit-layout">

    <!-- ① IMAGES — drop zone + image list -->
    <div class="card card-no-mb imgedit-images-card">
      <div class="card-head">
        <div class="card-head-left">
          <div class="step-num">1</div>
          <span class="card-title">Images</span>
        </div>
        <span class="col-head-badge" id="ie-img-count"></span>
        <button class="btn btn-mini" id="ie-clear-imgs" style="display:none">Clear all</button>
      </div>
      <div class="card-body">
        <div class="imgedit-images-inner">
          <!-- Drop zone -->
          <div class="imgedit-drop-col">
            <div class="drop-zone" id="ie-drop-zone">
              <svg class="drop-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <div class="drop-text">Drop images/folders or <span class="browse-link" id="ie-browse">browse</span></div>
              <div class="drop-sub">PNG, JPG, GIF, WEBP, SVG — folders supported</div>
              <input id="ie-file-input" type="file" class="file-input-hidden" multiple accept="image/*"/>
              <input id="ie-folder-input" type="file" class="file-input-hidden" webkitdirectory/>
            </div>
            <div class="imgedit-browse-bar">
              <button class="btn btn-small imgedit-add-btn" id="ie-browse-files">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                Files
              </button>
              <button class="btn btn-small imgedit-add-btn" id="ie-browse-folder">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
                </svg>
                Folder
              </button>
            </div>
          </div>
          <!-- Thumbnail list -->
          <div class="imgedit-thumb-col">
            <div class="imgedit-thumb-list" id="ie-thumb-list">
              <div class="imgedit-empty-state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="32" height="32">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <span>No images loaded</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM ROW: Actions (left) + Run (right) -->
    <div class="imgedit-bottom">

      <!-- ② ACTIONS -->
      <div class="card card-no-mb imgedit-actions-card">
        <div class="card-head">
          <div class="card-head-left">
            <div class="step-num">2</div>
            <span class="card-title">Actions</span>
          </div>
          <span class="col-head-badge" id="ie-action-count"></span>
          <button class="btn btn-mini" id="ie-clear-actions" style="display:none">Clear all</button>
        </div>
        <div class="card-body">

          <!-- Add action buttons -->
          <div class="imgedit-add-bar">
            <button class="btn btn-small imgedit-add-btn" id="ie-add-trim">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Trim
            </button>
            <button class="btn btn-small imgedit-add-btn" id="ie-add-resize">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Resize
            </button>
          </div>

          <!-- Dynamic action instances rendered by JS -->
          <div class="imgedit-action-list" id="ie-action-list">
            <div class="imgedit-action-empty" id="ie-action-empty">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="28" height="28">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M12 4v16m8-8H4"/>
              </svg>
              <span>No actions added yet</span>
            </div>
          </div>

        </div>
      </div>

      <!-- ③ RUN -->
      <div class="imgedit-run-col">
        <div class="card">
          <div class="card-head">
            <div class="card-head-left">
              <div class="step-num">3</div>
              <span class="card-title">Run</span>
            </div>
          </div>
          <div class="card-body">
            <div class="imgedit-order-label">Action order (drag to reorder)</div>
            <div class="imgedit-order-list" id="ie-order-list">
              <div class="imgedit-order-empty">Enable actions in Step 2</div>
            </div>
            <div class="imgedit-run-summary" id="ie-run-summary">
              <div class="imgedit-run-dim">Select images and at least one action</div>
            </div>
            <button class="btn primary imgedit-run-btn" id="ie-btn-run" disabled>
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>Run &amp; Download</span>
            </button>
            <div class="imgedit-prog" id="ie-prog" style="display:none">
              <div class="prog-row">
                <span id="ie-prog-label">Processing…</span>
                <span id="ie-prog-pct">0%</span>
              </div>
              <div class="prog-track"><div class="prog-fill" id="ie-prog-bar"></div></div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- end bottom -->

  </div><!-- end layout -->
</div>
