<!-- src/html/image-editor.html — Image Editor: trim & resize images client-side -->
<div class="imgedit-page animate-fade-in">

  <h1 class="page-heading">Image Editor</h1>

  <div class="imgedit-layout">

    <!-- ① IMAGES — drop zone + image list -->
    <div class="card card-no-mb">
      <div class="card-head">
        <div class="card-head-left">
          <div class="step-num">1</div>
          <span class="card-title">Images</span>
        </div>
        <span class="col-head-badge" id="ie-img-count"></span>
        <button class="btn btn-mini" id="ie-clear-imgs" style="display:none">Clear all</button>
      </div>
      <div class="card-body">
        <div class="imgedit-images-inner">
          <!-- Drop zone -->
          <div class="imgedit-drop-col">
            <div class="drop-zone" id="ie-drop-zone">
              <svg class="drop-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <div class="drop-text">Drop images or <span class="browse-link" id="ie-browse">browse</span></div>
              <div class="drop-sub">PNG, JPG, GIF, WEBP, SVG</div>
              <input id="ie-file-input" type="file" class="file-input-hidden" multiple accept="image/*"/>
            </div>
          </div>
          <!-- Thumbnail list -->
          <div class="imgedit-thumb-col">
            <div class="imgedit-thumb-list" id="ie-thumb-list">
              <div class="imgedit-empty-state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="32" height="32">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <span>No images loaded</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM ROW: Actions (left) + Run (right) -->
    <div class="imgedit-bottom">

      <!-- ② ACTIONS -->
      <div class="card card-no-mb imgedit-actions-card">
        <div class="card-head">
          <div class="card-head-left">
            <div class="step-num">2</div>
            <span class="card-title">Actions</span>
          </div>
        </div>
        <div class="card-body">

          <!-- TRIM -->
          <div class="imgedit-action-group">
            <label class="imgedit-action-toggle">
              <input type="checkbox" id="ie-trim-enabled"/>
              <span class="imgedit-toggle-label">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M6 2v4M6 18v4M2 6h4m12 0h4M18 2v4m0 12v4M2 18h4m12 0h4M8 8h8v8H8z"/>
                </svg>
                Trim
              </span>
            </label>
            <div class="imgedit-action-body" id="ie-trim-body">
              <label class="imgedit-option">
                <input type="checkbox" id="ie-trim-auto" checked/>
                <span>Auto-trim transparent pixels</span>
              </label>
              <div class="imgedit-option-row" id="ie-trim-manual-row" style="display:none">
                <div class="imgedit-field-group">
                  <label class="imgedit-field-label">Top</label>
                  <input type="number" class="imgedit-input" id="ie-trim-top" value="0" min="0" placeholder="px"/>
                </div>
                <div class="imgedit-field-group">
                  <label class="imgedit-field-label">Right</label>
                  <input type="number" class="imgedit-input" id="ie-trim-right" value="0" min="0" placeholder="px"/>
                </div>
                <div class="imgedit-field-group">
                  <label class="imgedit-field-label">Bottom</label>
                  <input type="number" class="imgedit-input" id="ie-trim-bottom" value="0" min="0" placeholder="px"/>
                </div>
                <div class="imgedit-field-group">
                  <label class="imgedit-field-label">Left</label>
                  <input type="number" class="imgedit-input" id="ie-trim-left" value="0" min="0" placeholder="px"/>
                </div>
              </div>
            </div>
          </div>

          <!-- RESIZE -->
          <div class="imgedit-action-group">
            <label class="imgedit-action-toggle">
              <input type="checkbox" id="ie-resize-enabled"/>
              <span class="imgedit-toggle-label">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5"/>
                </svg>
                Resize
              </span>
            </label>
            <div class="imgedit-action-body" id="ie-resize-body">
              <div class="imgedit-resize-modes">
                <label class="imgedit-radio">
                  <input type="radio" name="ie-resize-mode" value="scale" checked/>
                  <span>Scale by %</span>
                </label>
                <label class="imgedit-radio">
                  <input type="radio" name="ie-resize-mode" value="fixed"/>
                  <span>Fixed size (px)</span>
                </label>
              </div>

              <!-- Scale mode -->
              <div class="imgedit-option-row" id="ie-resize-scale-row">
                <div class="imgedit-field-group">
                  <label class="imgedit-field-label">Scale</label>
                  <div class="imgedit-input-suffix">
                    <input type="number" class="imgedit-input" id="ie-resize-scale" value="50" min="1" max="1000" step="1"/>
                    <span class="imgedit-suffix">%</span>
                  </div>
                </div>
              </div>

              <!-- Fixed mode -->
              <div class="imgedit-option-row" id="ie-resize-fixed-row" style="display:none">
                <div class="imgedit-field-group">
                  <label class="imgedit-field-label">Width</label>
                  <div class="imgedit-input-suffix">
                    <input type="number" class="imgedit-input" id="ie-resize-w" value="256" min="1" placeholder="px"/>
                    <span class="imgedit-suffix">px</span>
                  </div>
                </div>
                <div class="imgedit-field-group">
                  <label class="imgedit-field-label">Height</label>
                  <div class="imgedit-input-suffix">
                    <input type="number" class="imgedit-input" id="ie-resize-h" value="256" min="1" placeholder="px"/>
                    <span class="imgedit-suffix">px</span>
                  </div>
                </div>
                <label class="imgedit-option">
                  <input type="checkbox" id="ie-resize-lock" checked/>
                  <span>Keep aspect ratio</span>
                </label>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- ③ RUN -->
      <div class="imgedit-run-col">
        <div class="card">
          <div class="card-head">
            <div class="card-head-left">
              <div class="step-num">3</div>
              <span class="card-title">Run</span>
            </div>
          </div>
          <div class="card-body">
            <div class="imgedit-order-label">Action order (drag to reorder)</div>
            <div class="imgedit-order-list" id="ie-order-list">
              <div class="imgedit-order-empty">Enable actions in Step 2</div>
            </div>
            <div class="imgedit-run-summary" id="ie-run-summary">
              <div class="imgedit-run-dim">Select images and at least one action</div>
            </div>
            <button class="btn primary imgedit-run-btn" id="ie-btn-run" disabled>
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>Run &amp; Download</span>
            </button>
            <div class="imgedit-prog" id="ie-prog" style="display:none">
              <div class="prog-row">
                <span id="ie-prog-label">Processing…</span>
                <span id="ie-prog-pct">0%</span>
              </div>
              <div class="prog-track"><div class="prog-fill" id="ie-prog-bar"></div></div>
            </div>
            <div class="imgedit-log" id="ie-log">
              <div class="log-dim">// ready</div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- end bottom -->

  </div><!-- end layout -->
</div>
