      <stop offset="50%" style="stop-color:#16213E"/>
      <stop offset="100%" style="stop-color:#0F3460"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5CBA7"/>
