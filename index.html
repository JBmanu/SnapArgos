<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Snap! Argos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./dist/output.css"/>
</head>
<body>
<div class="shimmer"></div>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar-nav" id="sidebar-nav">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <img src="./src/assets/logo/logo1.svg" class="logo-img" alt="Argos logo"/>
      <span class="sidebar-label logo-name">Argos</span>
    </div>
    <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
        <rect x="3" y="3" width="18" height="18" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v18"/>
      </svg>
    </button>
  </div>

  <nav class="sidebar-links">
    <button class="sidebar-link active" data-page="overview" title="Overview">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
      <span class="sidebar-label">Overview</span>
    </button>
    <button class="sidebar-link" data-page="uploader" title="Uploader">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
      </svg>
      <span class="sidebar-label">Uploader</span>
    </button>
    <!-- Spacer pushes donate to the bottom of the nav area -->
    <div class="sidebar-spacer"></div>
    <button class="sidebar-link sidebar-link-donate" id="btn-donate" title="Donate">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364L12 20.364l-7.682-7.682a4.5 4.5 0 010-6.364z"/>
      </svg>
      <span class="sidebar-label">Donate</span>
    </button>
  </nav>

  <!-- Bottom: Legal only -->
  <div class="sidebar-footer">
    <button class="sidebar-link sidebar-link-legal" data-page="legal" title="Legal">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span class="sidebar-label">Legal</span>
    </button>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<div class="main-wrap" id="main-wrap">

  <!-- CREDENTIALS (sticky) -->
  <div class="cred-bar">
    <div class="cred-bar-inner">
      <div class="cred-fields">
        <div>
          <label class="label">Username</label>
          <input id="inp-user" class="input" type="text" placeholder="snap_username" autocomplete="username"/>
        </div>
        <div>
          <label class="label">Password</label>
          <div class="input-wrap">
            <input id="inp-pass" class="input" type="password" placeholder="••••••••" autocomplete="current-password"/>
            <button class="eye-btn" id="eye-btn" type="button" title="Show/hide password">
              <svg id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="cred-action">
          <button class="btn" id="btn-refresh">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <span>Refresh</span>
          </button>
        </div>
      </div>
      <div class="cred-status warn" id="cred-status">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span id="cred-msg">Fill in username and password to connect</span>
      </div>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <main class="page-content" id="page-content"></main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="site-footer-copy">© 2026 Snap! Argos</span>
    <nav class="site-footer-links">
      <button class="footer-link" data-page="legal" data-section="disclaimer">Disclaimer</button>
      <span class="site-footer-sep">·</span>
      <button class="footer-link" data-page="legal" data-section="terms">Terms of Use</button>
      <span class="site-footer-sep">·</span>
      <button class="footer-link" data-page="legal" data-section="privacy">Privacy Policy</button>
    </nav>
  </footer>

</div>

<!-- ═══ DONATE MODAL ═══ -->
<div class="modal-overlay" id="donate-modal" aria-modal="true" role="dialog" aria-label="Donate">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title-row">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="modal-title-icon">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364L12 20.364l-7.682-7.682a4.5 4.5 0 010-6.364z"/>
        </svg>
        <span class="modal-title">Support Snap Argos</span>
      </div>
      <button class="modal-close" id="donate-modal-close" title="Close">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">Snap Argos is free and open source. If you find it useful, consider supporting its development with a small donation — every contribution is greatly appreciated!</p>
      <div class="donate-qr-wrap">
        <img src="./src/assets/donate/donate-qr.jpeg" alt="Donation QR code" class="donate-qr"/>
        <span class="donate-qr-label">Scan to donate via PayPal</span>
      </div>
      <a class="donate-paypal-btn" href="https://paypal.me/placeholder" target="_blank" rel="noopener">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
        Donate via PayPal
      </a>
    </div>
  </div>
</div>

<script type="module" src="./src/js/app.js"></script>
</body>
</html>
